<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | KarangCareerHub</title>
  <link rel="stylesheet" href="reset-password.css">
</head>
<body>

<div class="page">
  <div class="container">

    <h1>Reset Your Password</h1>

    <p class="info-text">
      Enter your new password below
    </p>

    <form id="resetPasswordForm">

      <div class="input-group">
        <label>New Password</label>
        <input type="password" id="resetPassword" required>
        <span class="toggle-password" data-target="resetPassword">👁</span>
        <div id="strengthBar"></div>
        <small id="strengthText"></small>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="resetConfirmPassword" required>
        <span class="toggle-password" data-target="resetConfirmPassword">👁</span>
      </div>

      <button type="submit">Update Password</button>
    </form>

    <div id="successBox" class="success-box">
        <div class="checkmark">✔</div>
        <h2>Password Updated!</h2>
        <p>You can now login with your new password.</p>
      </div>

    <p id="resetMessage"></p>

    <p class="back-link">
      <a href="login.html">← Back to Login</a>
    </p>

  </div>
</div>

<script src="reset-password.js"></script>
</body>
</html>
