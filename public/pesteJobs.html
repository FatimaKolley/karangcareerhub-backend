<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a New Job | KarangCareerHub</title>
  <link rel="stylesheet" href="dashboardEmployer.css">
  <link rel="stylesheet" href="pesteJobs.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <img src="image/logo.png" alt="KarangCareerHub Logo">
    </div>
    <h2>Post a New Job</h2>
    <div class="nav-links">
      <a href="dashboardEmployer.html">← Back to Dashboard</a>
    </div>
  </nav>

  <main class="job-posting-form">
    <form id="posteJobForm" enctype="multipart/form-data">

      <!-- Job Details Section -->
      <fieldset>
        <legend>Job Details</legend>

        <label for="title">Job Title <span>*</span></label>
        <input type="text" id="title" name="title" required placeholder="e.g., Software Developer">

        <label for="category">Category <span>*</span></label>
        <select id="category" name="category" required>
          <option value="">Select Category</option>
          <option value="IT">IT / Software</option>
          <option value="Finance">Finance</option>
          <option value="Marketing">Marketing</option>
          <option value="Design">Design / Creative</option>
          <option value="Engineering">Engineering</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Education">Education</option>
          <option value="Administration">Administration</option>
          <option value="Customer Service">Customer Service</option>
          <option value="Sales">Sales</option>
          <option value="Human Resources">Human Resources</option>
          <option value="Logistics">Logistics / Supply Chain</option>
          <option value="Internship">Internship</option>
          <option value="Other">Other</option>
        </select>

        <label for="type">Job Type <span>*</span></label>
        <select id="type" name="type" required>
          <option value="">Select Job Type</option>
          <option value="Full-time">Full-time</option>
          <option value="Part-time">Part-time</option>
          <option value="Contract">Contract</option>
          <option value="Temporary">Temporary</option>
          <option value="Internship">Internship</option>
          <option value="Remote">Remote</option>
        </select>

        <label for="deadline">Application Deadline <span>*</span></label>
        <input type="date" id="deadline" name="deadline" required>

        <label for="location">Location <span>*</span></label>
        <input type="text" id="location" name="location" placeholder="e.g., Banjul, Brikama, Serrekunda" required>
      </fieldset>

      <!-- Job Description -->
      <fieldset>
        <legend>Job Description</legend>

        <label for="description">Description <span>*</span></label>
        <textarea id="description" name="description" rows="6" placeholder="Describe the role, responsibilities, and requirements" required></textarea>

        <label for="skills">Required Skills</label>
        <input type="text" id="skills" name="skills" placeholder="Comma separated, e.g., JavaScript, HTML, CSS">

        <label for="experience">Experience Required (Years)</label>
        <input type="number" id="experience" name="experience" min="0" step="1" placeholder="Optional, e.g., 2">

        <label for="salary">Salary Amount</label>
        <input type="number" id="salary" name="salary" min="0" step="0.01" placeholder="Optional, e.g., 3000">

        <label for="currency">Currency</label>
        <select id="currency" name="currency">
          <option value="GMD" selected>GMD (Dalasi)</option>
        </select>
      </fieldset>

      <!-- Optional Attachments -->
      <fieldset>
        <legend>Attachments (Optional)</legend>
      
        <label for="jobFile">Upload Job Description / PDF</label>
        <input type="file" id="jobFile" name="file" accept=".pdf">
        <small>Only PDF files are allowed.</small>
      </fieldset>

      <!-- Submit Button -->
      <div class="form-actions">
        <button type="submit" class="submit-btn">Post Job</button>
        <button type="reset" class="reset-btn">Reset</button>
      </div>

    </form>
  </main>

  <script src="pesteJob.js"></script>
  <script src="employerTheme.js"></script>
</body>
</html>
